<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaviyaDew API | Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden-form { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen text-slate-200">

    <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 fade-in">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                NaviyaDew
            </h1>
            <p class="text-slate-400 text-sm mt-2">The Ultimate API Hub</p>
        </div>

        <div id="loginForm">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <i class="fas fa-sign-in-alt text-blue-500"></i> Login
            </h2>
            <form action="/auth/login" method="POST" class="space-y-4">
                <div>
                    <label class="text-xs uppercase font-bold text-slate-500 ml-1">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="john@example.com">
                </div>
                <div>
                    <label class="text-xs uppercase font-bold text-slate-500 ml-1">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
                </div>
                <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 p-3 rounded-xl font-bold shadow-lg shadow-blue-900/20 transition transform hover:scale-[1.02]">
                    Sign In
                </button>
            </form>
            <p class="text-center mt-6 text-sm text-slate-400">
                Don't have an account? <a href="#" onclick="toggleForm()" class="text-blue-400 hover:underline font-semibold">Sign Up</a>
            </p>
        </div>

        <div id="signupForm" class="hidden-form">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-green-400">
                <i class="fas fa-user-plus"></i> Create Account
            </h2>
            <form action="/auth/signup" method="POST" class="space-y-4">
                <div>
                    <label class="text-xs uppercase font-bold text-slate-500 ml-1">Full Name</label>
                    <input type="text" name="name" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="Nimsara Naviduh">
                </div>
                <div>
                    <label class="text-xs uppercase font-bold text-slate-500 ml-1">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="naviya@gmail.com">
                </div>
                <div>
                    <label class="text-xs uppercase font-bold text-slate-500 ml-1">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="••••••••">
                </div>
                <button class="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 p-3 rounded-xl font-bold shadow-lg shadow-green-900/20 transition transform hover:scale-[1.02]">
                    Verify Email
                </button>
            </form>
            <p class="text-center mt-6 text-sm text-slate-400">
                Already member? <a href="#" onclick="toggleForm()" class="text-green-400 hover:underline font-semibold">Log In</a>
            </p>
        </div>
    </div>

    <script>
        function toggleForm() {
            const login = document.getElementById('loginForm');
            const signup = document.getElementById('signupForm');
            login.classList.toggle('hidden-form');
            signup.classList.toggle('hidden-form');
        }
    </script>
</body>
</html>
